<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYROX — World Events Map</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Variables ─────────────────────────────── */
    :root {
      --yellow: #ffed00;
      --black:  #000000;
      --panel:  #0f0f0f;
      --card:   #181818;
      --card-h: #222222;
      --border: #2a2a2a;
      --muted:  #666666;
      --text:   #ffffff;
      --hd:     'Bebas Neue', sans-serif;
      --bd:     'Inter', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--bd);
      background: var(--black);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      flex-shrink: 0;
      height: 60px;
      background: #000;
      border-bottom: 2px solid var(--yellow);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      z-index: 200;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-box {
      width: 36px;
      height: 36px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-box span {
      font-family: var(--hd);
      font-size: 22px;
      color: #000;
      line-height: 1;
    }
    .logo-name {
      font-family: var(--hd);
      font-size: 26px;
      letter-spacing: 4px;
      color: #fff;
    }
    .logo-name em {
      font-style: normal;
      color: var(--yellow);
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-left: 2px;
    }

    .sep { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

    .stats {
      display: flex;
      gap: 20px;
      margin-left: auto;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-val {
      font-family: var(--hd);
      font-size: 22px;
      color: var(--yellow);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Body ──────────────────────────────────── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }
    .search {
      width: 100%;
      padding: 9px 12px 9px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #fff;
      font-family: var(--bd);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--yellow); }
    .search::placeholder { color: var(--muted); }

    .filters {
      display: flex;
      gap: 8px;
    }
    .filter {
      flex: 1;
      padding: 7px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #fff;
      font-family: var(--bd);
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter:focus { border-color: var(--yellow); }
    .filter option { background: var(--card); }

    .list-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-title {
      font-family: var(--hd);
      font-size: 14px;
      letter-spacing: 2px;
    }
    .badge {
      background: var(--yellow);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 2px;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Event card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 3px;
      padding: 10px 12px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: background 0.15s, border-left-color 0.15s;
    }
    .card:hover { background: var(--card-h); border-left-color: var(--yellow); }
    .card.active { background: var(--card-h); border-left-color: var(--yellow); }

    .card-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .card-row {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
    }
    .card-row svg { opacity: 0.6; flex-shrink: 0; }
    .card-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--yellow);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    .empty {
      padding: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Map ───────────────────────────────────── */
    #map {
      flex: 1;
      background: #080808;
    }

    /* ── Leaflet overrides ─────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #111 !important;
      border: 1px solid var(--yellow) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 24px rgba(255,237,0,.15) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-control-zoom a {
      background: #111 !important;
      color: #fff !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--yellow) !important; color: #000 !important; }
    .leaflet-control-attribution {
      background: rgba(0,0,0,.6) !important;
      color: var(--muted) !important;
    }
    .leaflet-control-attribution a { color: var(--yellow) !important; }

    /* Popup inner */
    .popup {
      min-width: 220px;
      font-family: var(--bd);
    }
    .popup-head {
      background: var(--yellow);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .popup-head-label {
      font-family: var(--hd);
      font-size: 12px;
      letter-spacing: 2px;
      color: #000;
    }
    .popup-body { padding: 12px; }
    .popup-title {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .popup-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .popup-row {
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .popup-row svg { opacity: 0.7; flex-shrink: 0; }
    .popup-btn {
      display: block;
      text-align: center;
      padding: 8px;
      background: var(--yellow);
      color: #000;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-decoration: none;
      border-radius: 2px;
      transition: opacity 0.15s;
    }
    .popup-btn:hover { opacity: 0.85; }
    .popup-btn.disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    /* ── Loading overlay ───────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.94);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .ov-logo {
      font-family: var(--hd);
      font-size: 80px;
      letter-spacing: 14px;
      color: #fff;
      margin-bottom: 4px;
    }
    .ov-logo em { font-style: normal; color: var(--yellow); }

    .ov-sub {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .ov-bar {
      width: 180px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .ov-fill {
      height: 100%;
      background: var(--yellow);
      animation: fill 2.2s ease-in-out infinite;
    }
    @keyframes fill {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    .ov-text {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .ov-err {
      margin-top: 16px;
      font-size: 13px;
      color: #ff4d4d;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }
    .ov-err code {
      background: #1a1a1a;
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--yellow);
      font-size: 12px;
    }
  </style>
</head>
<body>

<!-- ── Loading overlay ─────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="ov-logo">HY<em>R</em>OX</div>
  <div class="ov-sub">World Events Map</div>
  <div class="ov-bar"><div class="ov-fill"></div></div>
  <div class="ov-text" id="ov-text">Loading events worldwide…</div>
</div>

<!-- ── App shell ───────────────────────────────── -->
<div class="app">

  <!-- Header -->
  <header class="header">
    <a class="logo" href="https://hyrox.com" target="_blank" rel="noopener">
      <div class="logo-box"><span>H</span></div>
      <div>
        <div class="logo-name">HY<em>R</em>OX</div>
        <div class="logo-sub">World Events Map</div>
      </div>
    </a>

    <div class="sep"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="st-total">—</div>
        <div class="stat-lbl">Events</div>
      </div>
      <div class="sep"></div>
      <div class="stat">
        <div class="stat-val" id="st-countries">—</div>
        <div class="stat-lbl">Countries</div>
      </div>
      <div class="sep"></div>
      <div class="stat">
        <div class="stat-val" id="st-map">—</div>
        <div class="stat-lbl">On Map</div>
      </div>
    </div>
  </header>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="#fff" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search" id="search" type="text"
                 placeholder="Search city, country or event…" />
        </div>
        <div class="filters">
          <select class="filter" id="f-year">
            <option value="">All years</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
          <select class="filter" id="f-region">
            <option value="">All regions</option>
            <option value="europe">Europe</option>
            <option value="americas">Americas</option>
            <option value="asia-pacific">Asia-Pacific</option>
            <option value="middle east">Middle East</option>
            <option value="africa">Africa</option>
          </select>
        </div>
      </div>

      <div class="list-header">
        <span class="list-title">RACE CALENDAR</span>
        <span class="badge" id="list-count">0</span>
      </div>

      <div class="list" id="list"></div>
    </aside>

    <!-- Map -->
    <div id="map"></div>

  </div><!-- /.body -->
</div><!-- /.app -->

<script>
// ── Map init ───────────────────────────────────────────────────────
const WORLD_BOUNDS = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));

const map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  minZoom: 2,
  maxZoom: 12,
  maxBounds: WORLD_BOUNDS,
  maxBoundsViscosity: 1.0,
}).setView([20, 10], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 12,
  subdomains: 'abcd',
  noWrap: true,
  bounds: WORLD_BOUNDS,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomright', prefix: '' })
  .addAttribution('© <a href="https://carto.com/">CARTO</a> | © <a href="https://openstreetmap.org">OSM</a>')
  .addTo(map);

// ── Marker factory ─────────────────────────────────────────────────
function markerIcon(active = false) {
  const size = active ? 18 : 12;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;
      background:#ffed00;
      border:${active ? 3 : 2}px solid #000;
      border-radius:50%;
      box-shadow:0 0 ${active ? 10 : 5}px rgba(255,237,0,${active ? .7 : .35});
      transition:all .2s;
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

// ── Popup HTML ─────────────────────────────────────────────────────
function popupHtml(ev) {
  const calSvg = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ffed00" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const pinSvg = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ffed00" stroke-width="2">
    <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
    <circle cx="12" cy="10" r="3"/></svg>`;

  return `<div class="popup">
    <div class="popup-head">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#000" stroke="#000" stroke-width="1">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="popup-head-label">HYROX EVENT</span>
    </div>
    <div class="popup-body">
      <div class="popup-title">${ev.title}</div>
      <div class="popup-meta">
        ${ev.date ? `<div class="popup-row">${calSvg} ${ev.date}</div>` : ''}
        ${ev.location ? `<div class="popup-row">${pinSvg} ${ev.location}</div>` : ''}
      </div>
      ${ev.link
        ? `<a class="popup-btn" href="${ev.link}" target="_blank" rel="noopener">REGISTER NOW →</a>`
        : `<span class="popup-btn disabled">REGISTRATION COMING SOON</span>`}
    </div>
  </div>`;
}

// ── Card HTML ──────────────────────────────────────────────────────
function cardHtml(ev, idx) {
  const cal = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const pin = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
    <circle cx="12" cy="10" r="3"/></svg>`;

  return `<div class="card" data-idx="${idx}" onclick="selectEvent(${idx})">
    <div class="card-title">${ev.title}</div>
    ${ev.date ? `<div class="card-row">${cal} ${ev.date}</div>` : ''}
    ${ev.location ? `<div class="card-row">${pin} ${ev.location}</div>` : ''}
    ${ev.link ? `<a class="card-link" href="${ev.link}" target="_blank" rel="noopener"
      onclick="event.stopPropagation()">Register →</a>` : ''}
  </div>`;
}

// ── State ──────────────────────────────────────────────────────────
let allEvents      = [];
let filtered       = [];
let markerList     = []; // [{marker, listIdx}]
let activeIdx      = null;

// ── Render markers ─────────────────────────────────────────────────
function renderMarkers(events) {
  markerList.forEach(({ marker }) => map.removeLayer(marker));
  markerList = [];

  events.forEach((ev, i) => {
    if (!ev.coordinates) return;

    const m = L.marker(ev.coordinates, { icon: markerIcon(false) }).addTo(map);
    m.bindPopup(popupHtml(ev), { maxWidth: 280, className: '' });
    m.on('click', () => selectEvent(i, false));
    markerList.push({ marker: m, listIdx: i });
  });

  document.getElementById('st-map').textContent = markerList.length;
}

// ── Render list ────────────────────────────────────────────────────
function renderList(events) {
  const el = document.getElementById('list');
  document.getElementById('list-count').textContent = events.length;

  if (events.length === 0) {
    el.innerHTML = '<div class="empty">No events match your search</div>';
    return;
  }
  el.innerHTML = events.map((ev, i) => cardHtml(ev, i)).join('');
}

// ── Update header stats ────────────────────────────────────────────
function updateStats(events) {
  document.getElementById('st-total').textContent = events.length;

  const countries = new Set();
  events.forEach((ev) => {
    const parts = (ev.location || '').split(',');
    const last = parts[parts.length - 1]?.trim();
    if (last) countries.add(last.toLowerCase());
  });
  document.getElementById('st-countries').textContent = countries.size || '—';
}

// ── Select / highlight an event ────────────────────────────────────
function selectEvent(listIdx, scrollCard = true) {
  const ev = filtered[listIdx];
  if (!ev) return;

  // un-highlight previous
  if (activeIdx !== null) {
    const prev = document.querySelector(`.card[data-idx="${activeIdx}"]`);
    if (prev) prev.classList.remove('active');
    const prevM = markerList.find((m) => m.listIdx === activeIdx);
    if (prevM) prevM.marker.setIcon(markerIcon(false));
  }

  activeIdx = listIdx;

  // highlight card
  const card = document.querySelector(`.card[data-idx="${listIdx}"]`);
  if (card) {
    card.classList.add('active');
    if (scrollCard) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // highlight + open marker
  const mo = markerList.find((m) => m.listIdx === listIdx);
  if (mo) {
    mo.marker.setIcon(markerIcon(true));
    map.setView(ev.coordinates, Math.max(map.getZoom(), 6), { animate: true });
    setTimeout(() => mo.marker.openPopup(), 250);
  }
}

// ── Filters ────────────────────────────────────────────────────────
function applyFilters() {
  const q       = document.getElementById('search').value.toLowerCase().trim();
  const year    = document.getElementById('f-year').value;
  const region  = document.getElementById('f-region').value.toLowerCase();

  filtered = allEvents.filter((ev) => {
    const hay = `${ev.title} ${ev.location} ${ev.date}`.toLowerCase();
    return (
      (!q      || hay.includes(q)) &&
      (!year   || (ev.date && ev.date.includes(year))) &&
      (!region || ev.continent === region)
    );
  });

  activeIdx = null;
  renderList(filtered);
  renderMarkers(filtered);
}

['search', 'f-year', 'f-region'].forEach((id) => {
  const el = document.getElementById(id);
  el.addEventListener(id === 'search' ? 'input' : 'change', applyFilters);
});

// ── Load events from API ───────────────────────────────────────────
async function loadEvents() {
  try {
    const resp = await fetch('/api/events');
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

    allEvents = await resp.json();
    filtered  = [...allEvents];

    renderMarkers(filtered);
    renderList(filtered);
    updateStats(allEvents);

    // hide overlay
    const ov = document.getElementById('overlay');
    ov.classList.add('hidden');
    setTimeout(() => { ov.style.display = 'none'; }, 420);

  } catch (err) {
    console.error(err);
    document.getElementById('ov-text').style.display = 'none';
    document.getElementById('overlay').insertAdjacentHTML('beforeend', `
      <div class="ov-err">
        Could not reach the server.<br/>
        Make sure <code>node server.js</code> is running, then reload.
      </div>
    `);
  }
}

loadEvents();
</script>
</body>
</html>
